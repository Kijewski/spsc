# https://embarkstudios.github.io/cargo-deny/cli/init.html

[graph]
targets = ["x86_64-unknown-linux-gnu"]
all-features = true

[licenses]
version = 2
allow = ["Apache-2.0", "ISC", "MIT"]
private.ignore = false

[bans]
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
